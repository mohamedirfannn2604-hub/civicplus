<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicPulse — Admin Setup</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #000;
    color: #e5e5e5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: rgba(10,10,10,0.9);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 18px;
    max-width: 480px;
    width: 100%;
    padding: 2.2rem;
  }
  h1 {
    font-size: 1.25rem;
    color: #ffd700;
    margin-bottom: 0.4rem;
  }
  p.sub {
    font-size: 0.85rem;
    color: #999;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
  .field { margin-bottom: 1rem; }
  label {
    display: block;
    font-size: 0.78rem;
    color: #aaa;
    margin-bottom: 0.35rem;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 9px;
    padding: 0.65rem 0.9rem;
    color: #fff;
    font-size: 0.9rem;
    outline: none;
  }
  input:focus { border-color: #ffd700; }
  button {
    width: 100%;
    margin-top: 0.6rem;
    padding: 0.75rem;
    border-radius: 10px;
    border: none;
    background: #ffd700;
    color: #000;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #ffe14d; }
  #status {
    margin-top: 1rem;
    font-size: 0.85rem;
    padding: 0.8rem;
    border-radius: 9px;
    display: none;
    line-height: 1.5;
  }
  #status.success { background: rgba(76,217,123,0.12); color: #4cd97b; display: block; }
  #status.error   { background: rgba(255,95,126,0.12); color: #ff5f7e; display: block; }
  #status.info    { background: rgba(0,180,255,0.12);  color: #00b4ff; display: block; }
  code {
    background: rgba(255,255,255,0.08);
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.82rem;
  }
  .warn {
    margin-top: 1.2rem;
    font-size: 0.76rem;
    color: #ff9f43;
    background: rgba(255,159,67,0.08);
    border: 1px solid rgba(255,159,67,0.2);
    border-radius: 9px;
    padding: 0.7rem;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="card">
  <h1>⚙️ One-Time Admin Setup</h1>
  <p class="sub">Creates a Firebase Auth account and marks it as <strong>admin</strong> in Firestore. Run this once, then delete this file.</p>

  <div class="field">
    <label>Admin Name</label>
    <input id="name" type="text" value="Mohammed Irfan">
  </div>
  <div class="field">
    <label>Email</label>
    <input id="email" type="email" value="mohammedirfan@gmail.com">
  </div>
  <div class="field">
    <label>Password (min 6 characters)</label>
    <input id="password" type="text" value="123456">
  </div>

  <button id="createBtn" onclick="createAdmin()">Create Admin Account</button>

  <div id="status"></div>

  <div class="warn">
    ⚠️ This file can create or promote admin accounts. Delete <code>admin-setup.html</code>
    from your hosting after use, or anyone who finds the URL could create their own admin login.
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD4GlQGdYF0DFJlPxJ0MOUJg0vEqyHZssI",
    authDomain: "smart-community-portal.firebaseapp.com",
    projectId: "smart-community-portal",
    storageBucket: "smart-community-portal.firebasestorage.app",
    messagingSenderId: "719797226367",
    appId: "1:719797226367:web:493cfb9108f347ebbe684a",
    measurementId: "G-0HXC6FEE5B"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._fb = {
    auth, db, doc, setDoc, serverTimestamp,
    createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile
  };
  window.dispatchEvent(new Event('admin-setup-ready'));
</script>

<script>
let setupReady = false;
window.addEventListener('admin-setup-ready', () => { setupReady = true; });

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = type;
  el.innerHTML = msg;
}

async function createAdmin() {
  const btn = document.getElementById('createBtn');
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!name || !email || !password) {
    showStatus('Please fill in all fields.', 'error');
    return;
  }
  if (password.length < 6) {
    showStatus('Password must be at least 6 characters (Firebase requirement).', 'error');
    return;
  }
  if (!setupReady) {
    showStatus('Still connecting to Firebase, try again in a second.', 'info');
    return;
  }

  btn.disabled = true;
  showStatus('Creating account…', 'info');

  const { auth, db, doc, setDoc, serverTimestamp, createUserWithEmailAndPassword,
          signInWithEmailAndPassword, updateProfile } = window._fb;

  let uid = null;

  try {
    // Try creating a brand-new account
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    uid = cred.user.uid;
    await updateProfile(cred.user, { displayName: name });
    showStatus('Account created. Setting admin role…', 'info');
  } catch (e) {
    if (e.code === 'auth/email-already-in-use') {
      // Account already exists — sign in to get its uid, then we'll just promote the role
      showStatus('Account already exists. Signing in to verify and promote to admin…', 'info');
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        uid = cred.user.uid;
      } catch (signInErr) {
        btn.disabled = false;
        showStatus('An account with this email already exists, but the password you entered doesn\'t match it. Use the correct existing password, or use a different email.', 'error');
        return;
      }
    } else if (e.code === 'auth/weak-password') {
      btn.disabled = false;
      showStatus('Password must be at least 6 characters.', 'error');
      return;
    } else if (e.code === 'auth/invalid-email') {
      btn.disabled = false;
      showStatus('Please enter a valid email address.', 'error');
      return;
    } else {
      btn.disabled = false;
      showStatus('Error: ' + (e.message || e.code), 'error');
      return;
    }
  }

  // Write/overwrite the Firestore profile with role: admin
  try {
    await setDoc(doc(db, 'users', uid), {
      name, email, phone: '', blood_group: '',
      role: 'admin', created_at: serverTimestamp()
    }, { merge: true });

    showStatus(
      '✅ Success! <strong>' + email + '</strong> is now an admin.<br><br>' +
      'You can now log in at the main portal with this email and password, and you\'ll see the gold Admin link in the nav.<br><br>' +
      '<strong>Remember to delete this admin-setup.html file from your hosting once done.</strong>',
      'success'
    );
    btn.textContent = 'Done ✓';
  } catch (e) {
    showStatus('Account exists but setting admin role failed: ' + e.message + '<br><br>Check your Firestore security rules allow writes to the users collection.', 'error');
    btn.disabled = false;
  }
}
</script>

</body>
</html>
